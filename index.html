<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たまごのアプリ | ビジネス診断アプリ</title>
  <meta name="description" content="あなたのビジネスを10問で診断！無料の診断アプリをお試しください。">
  <meta property="og:title" content="たまごのアプリ | ビジネス診断アプリ">
  <meta property="og:description" content="あなたのビジネスを10問で診断！無料の診断アプリをお試しください。">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css?v=4">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" charset="utf-8"></script>
</head>
<body>
  <div class="screen">
    <div class="container">
      <div class="top-hero">
        <img src="images/icon.png" alt="たまご" class="top-icon">
        <h1 class="top-logo"><span>たまご</span>のアプリ</h1>
        <p class="top-subtitle">あなたのビジネスを10問で診断</p>
      </div>

      <div id="app-cards" class="app-cards"></div>

      <div class="footer">
        <p>powered by <a href="https://www.instagram.com/tamago.app" target="_blank" rel="noopener">@tamago.app</a></p>
      </div>
    </div>
  </div>
  <script src="apps.js?v=4"></script>
  <script src="shared/liff.js?v=4"></script>
  <script>
    var GAS_API = "https://script.google.com/macros/s/AKfycbx6ybbTIA_BNu1c-7RwzAgI-dCtZ2Fv_I5jhgql_27oNYapDsaYDwgNbmfpa8fWZG_K/exec";

    ShindanLiff.init();

    function renderApps(apps) {
      var container = document.getElementById("app-cards");
      container.innerHTML = "";
      apps.forEach(function (app) {
        var card = document.createElement("a");
        card.href = app.path;
        card.className = "app-card";
        card.innerHTML =
          '<div class="app-card-icon">' + app.icon + '</div>' +
          '<h2 class="app-card-title">' + app.title + '</h2>' +
          '<p class="app-card-desc">' + app.desc + '</p>' +
          '<span class="app-card-tag">' + app.tag + '</span>';
        container.appendChild(card);
      });
    }

    // GASから取得 → 失敗時はapps.jsのローカルデータにフォールバック
    fetch(GAS_API)
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.ok && data.apps && data.apps.length > 0) {
          renderApps(data.apps);
        } else {
          fallbackToLocal();
        }
      })
      .catch(function () {
        fallbackToLocal();
      });

    function fallbackToLocal() {
      var now = new Date();
      var published = APP_LIST.filter(function (app) {
        return new Date(app.publishDate) <= now;
      });
      renderApps(published);
    }
  </script>
</body>
</html>
