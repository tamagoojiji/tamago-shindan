<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>値段設定シミュレーター | たまごのアプリ</title>
  <meta name="description" content="原価・作業時間・目標月収を入力するだけで適正価格と必要客数を逆算！">
  <meta property="og:title" content="値段設定シミュレーター | たまごのアプリ">
  <meta property="og:description" content="原価・作業時間・目標月収を入力するだけで適正価格と必要客数を逆算！">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="../../style.css?v=4">
</head>
<body>
  <!-- イントロ画面 -->
  <div id="intro-screen" data-screen class="screen">
    <div class="container">
      <div class="intro-card">
        <div class="intro-icon">💰</div>
        <h1 class="intro-title">値段設定シミュレーター</h1>
        <p class="intro-desc">原価・作業時間・目標月収を入力するだけで<br>適正価格と必要客数を逆算できます！</p>
        <div class="intro-meta">
          <span>🧮 価格逆算</span>
          <span>⏱ 約1分</span>
        </div>
        <button class="btn btn-primary start-btn" onclick="FormUtils.showScreen('input-screen')">シミュレーション開始</button>
      </div>
      <div class="footer">
        <a href="../../">他のアプリを見る</a>
      </div>
    </div>
  </div>

  <!-- 入力画面 -->
  <div id="input-screen" data-screen class="screen hidden">
    <div class="container">
      <h2 class="section-title">メニュー情報を入力</h2>

      <button class="sample-btn" onclick="PricingApp.loadSample()">📋 サンプルデータで試す</button>

      <div class="intro-card" style="text-align:left;">
        <div class="form-group">
          <label class="form-label">メニュー名</label>
          <input type="text" id="menu-name" class="form-input" placeholder="例：カット+カラー">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">原価（材料費等）</label>
            <input type="number" id="cost" class="form-input" placeholder="例：500" min="0">
            <div class="form-hint">円</div>
          </div>
          <div class="form-group">
            <label class="form-label">作業時間</label>
            <input type="number" id="work-time" class="form-input" placeholder="例：60" min="1">
            <div class="form-hint">分</div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">目標月収（税引前）</label>
            <input type="number" id="target-income" class="form-input" placeholder="例：300000" min="1">
            <div class="form-hint">円</div>
          </div>
          <div class="form-group">
            <label class="form-label">月の営業日数</label>
            <input type="number" id="work-days" class="form-input" placeholder="例：22" min="1" max="31">
            <div class="form-hint">日</div>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="PricingApp.calculate()">計算する</button>
      </div>

      <div class="footer">
        <a href="../../">他のアプリを見る</a>
      </div>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" data-screen class="screen hidden">
    <div class="container">
      <div id="result-area"></div>

      <div class="cta-section" style="margin-top:24px;">
        <img src="../../images/icon.png" alt="たまご" class="cta-icon">
        <p class="cta-text">価格設定や経営のヒントを発信中！</p>
        <a href="https://www.instagram.com/tamago.app" target="_blank" rel="noopener" class="cta-btn">@tamago.app をフォロー</a>
      </div>

      <div class="result-actions" style="margin-top:20px;">
        <button class="btn btn-primary" onclick="PricingApp.reset()">もう一度試す</button>
        <button class="btn btn-secondary" onclick="location.href='../../'">他のアプリを見る</button>
      </div>
    </div>
  </div>

  <script src="../../shared/form-utils.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
