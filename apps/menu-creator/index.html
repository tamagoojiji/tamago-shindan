<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メニュー表作成 | たまごのアプリ</title>
  <meta name="description" content="メニュー項目を入力するだけでプロ級のメニュー表を作成！画像保存もできます。">
  <meta property="og:title" content="メニュー表作成 | たまごのアプリ">
  <meta property="og:description" content="メニュー項目を入力するだけでプロ級のメニュー表を作成！">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="../../style.css?v=4">
</head>
<body>
  <!-- イントロ画面 -->
  <div id="intro-screen" data-screen class="screen">
    <div class="container">
      <div class="intro-card">
        <div class="intro-icon">📝</div>
        <h1 class="intro-title">メニュー表作成</h1>
        <p class="intro-desc">メニュー項目を入力するだけで、きれいなメニュー表を自動生成！<br>画像として保存してSNSやチラシにも使えます。</p>
        <div class="intro-meta">
          <span>✏️ 入力体験</span>
          <span>⏱ 約2分</span>
        </div>
        <button class="btn btn-primary start-btn" onclick="FormUtils.showScreen('input-screen')">作成スタート</button>
      </div>
      <div class="footer">
        <a href="../../">他のアプリを見る</a>
      </div>
    </div>
  </div>

  <!-- 入力画面 -->
  <div id="input-screen" data-screen class="screen hidden">
    <div class="container">
      <h2 class="section-title">メニュー表の情報</h2>

      <button class="sample-btn" onclick="MenuApp.loadSample()">📋 サンプルで試す</button>

      <div class="intro-card" style="text-align:left;">
        <div class="form-group">
          <label class="form-label">店名</label>
          <input type="text" id="shop-name" class="form-input" placeholder="例：Hair Salon TAMAGO">
        </div>

        <div id="categories-area"></div>

        <button class="add-btn" onclick="MenuApp.addCategory()" style="margin-top:12px;">+ カテゴリを追加</button>

        <button class="btn btn-primary" style="width:100%;margin-top:20px;" onclick="MenuApp.preview()">プレビューを見る</button>
      </div>

      <div class="footer">
        <a href="../../">他のアプリを見る</a>
      </div>
    </div>
  </div>

  <!-- プレビュー画面 -->
  <div id="preview-screen" data-screen class="screen hidden">
    <div class="container">
      <div id="menu-preview-area" class="menu-preview"></div>

      <div class="share-section" style="margin-top:20px;">
        <p class="share-title">メニュー表を保存</p>
        <div class="share-buttons">
          <button id="save-image-btn" class="share-btn" onclick="MenuApp.saveImage()">
            <span class="share-btn-icon">📷</span>
            画像保存
          </button>
        </div>
      </div>

      <div class="cta-section" style="margin-top:24px;">
        <img src="../../images/icon.png" alt="たまご" class="cta-icon">
        <p class="cta-text">もっと便利なビジネスツールを配信中！</p>
        <a href="https://www.instagram.com/tamago.app" target="_blank" rel="noopener" class="cta-btn">@tamago.app をフォロー</a>
      </div>

      <div class="result-actions" style="margin-top:20px;">
        <button class="btn btn-primary" onclick="FormUtils.showScreen('input-screen')">編集に戻る</button>
        <button class="btn btn-secondary" onclick="location.href='../../'">他のアプリを見る</button>
      </div>
    </div>
  </div>

  <script src="../../shared/form-utils.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
